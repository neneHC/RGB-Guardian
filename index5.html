<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB Guardian - Final</title>
    <style>
        :root { --red: #ff3333; --green: #33ff33; --blue: #3333ff; }
        body {
            background-color: #000; color: white; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none;
            transition: background-color 0.1s;
        }

        /* Animação de Brilho/Flash */
        .game-over-flash {
            animation: flash 0.5s ease-out;
        }

        @keyframes flash {
            0% { background-color: #fff; }
            50% { background-color: #600; }
            100% { background-color: #000; }
        }

        #score { font-size: 3rem; font-weight: bold; color: #0ff; text-shadow: 0 0 15px #0ff; margin-bottom: 10px; }

        #game-view {
            position: relative; width: 80px; height: 480px;
            background: #111; border: 3px solid #444; border-radius: 12px;
        }

        .enemy, .bullet {
            position: absolute; width: 60px; height: 14px; left: 10px; border-radius: 4px;
        }
        .red { background: var(--red); box-shadow: 0 0 15px var(--red); }
        .green { background: var(--green); box-shadow: 0 0 15px var(--green); }
        .blue { background: var(--blue); box-shadow: 0 0 15px var(--blue); }

        .particle {
            position: absolute; width: 5px; height: 5px; border-radius: 50%; pointer-events: none; z-index: 5;
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; padding: 10px; text-align: center;
        }
        #msg { font-size: 1.5rem; margin-bottom: 20px; line-height: 1.2; font-weight: bold; }
        .btn-start {
            padding: 12px 30px; font-size: 1.2rem; background: #2ecc71;
            border: none; color: white; border-radius: 8px; cursor: pointer;
        }

        #controls { display: flex; gap: 20px; margin-top: 30px; }
        .btn {
            width: 70px; height: 70px; border-radius: 50%; border: none;
            cursor: pointer; font-weight: bold; color: white; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
        }
        .b-red { background: #a22; } .b-green { background: #2a2; } .b-blue { background: #22a; }
        .btn:active { transform: scale(0.9); filter: brightness(1.5); }
    </style>
</head>
<body>

    <div id="score">0</div>

    <div id="game-view">
        <div id="overlay">
            <div id="msg">RGB GUARDIAN</div>
            <button class="btn-start" id="start-btn">START</button>
        </div>
    </div>

    <div id="controls">
        <button class="btn b-red" id="ctrl-0">A</button>
        <button class="btn b-green" id="ctrl-1">S</button>
        <button class="btn b-blue" id="ctrl-2">D</button>
    </div>

    <script>
        const gameView = document.getElementById('game-view');
        const scoreDisplay = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');
        const colors = ['red', 'green', 'blue'];
        
        let score = 0, gameActive = false, speed = 1;
        let enemies = [], bullets = [], spawnTimer = null;

        function startGame() {
            score = 0; speed = 1; enemies = []; bullets = [];
            scoreDisplay.innerText = "0";
            overlay.style.display = "none";
            document.body.classList.remove('game-over-flash'); // Remove o flash ao reiniciar
            gameView.querySelectorAll('.enemy, .bullet, .particle').forEach(n => n.remove());
            gameActive = true;
            scheduleSpawn();
            requestAnimationFrame(update);
        }

        function scheduleSpawn() {
            if (!gameActive) return;
            const nextSpawn = Math.max(400, 1500 / speed);
            spawnTimer = setTimeout(() => {
                createEnemy();
                scheduleSpawn();
            }, nextSpawn);
        }

        function createEnemy() {
            const el = document.createElement('div');
            const colorIdx = Math.floor(Math.random() * 3);
            el.className = `enemy ${colors[colorIdx]}`;
            el.style.top = "-20px";
            gameView.appendChild(el);
            enemies.push({ el, top: -20, color: colorIdx });
            speed += 0.03;
        }

        function fire(idx) {
            if (!gameActive) return;
            const el = document.createElement('div');
            el.className = `bullet ${colors[idx]}`;
            el.style.top = "440px";
            gameView.appendChild(el);
            bullets.push({ el, top: 440, color: idx });
        }

        function explode(y, colorIdx) {
            const hex = {0: '#f33', 1: '#3f3', 2: '#33f'}[colorIdx];
            for(let i=0; i<10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = hex;
                p.style.left = '40px';
                p.style.top = y + 'px';
                gameView.appendChild(p);
                
                const vx = (Math.random() - 0.5) * 60;
                const vy = (Math.random() - 0.5) * 60;
                
                p.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${vx}px, ${vy}px)`, opacity: 0 }
                ], { duration: 400 }).onfinish = () => p.remove();
            }
        }

        function update() {
            if (!gameActive) return;

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].top += (2 * speed);
                enemies[i].el.style.top = enemies[i].top + "px";
                if (enemies[i].top > 460) {
                    endGame();
                    return;
                }
            }

            for (let b = bullets.length - 1; b >= 0; b--) {
                bullets[b].top -= 10;
                bullets[b].el.style.top = bullets[b].top + "px";

                if (bullets[b].top < -20) {
                    bullets[b].el.remove();
                    bullets.splice(b, 1);
                    continue;
                }

                for (let e = enemies.length - 1; e >= 0; e--) {
                    if (Math.abs(bullets[b].top - enemies[e].top) < 20) {
                        if (bullets[b].color === enemies[e].color) {
                            explode(enemies[e].top, enemies[e].color);
                            score += 10;
                            scoreDisplay.innerText = score;
                            enemies[e].el.remove();
                            enemies.splice(e, 1);
                        }
                        bullets[b].el.remove();
                        bullets.splice(b, 1);
                        break; 
                    }
                }
            }
            requestAnimationFrame(update);
        }

        function endGame() {
            gameActive = false;
            clearTimeout(spawnTimer);
            
            // Ativa o brilho na tela
            document.body.classList.add('game-over-flash');
            
            msg.innerText = "GAME OVER\nFINAL SCORE: " + score;
            msg.style.color = "red";
            overlay.style.display = "flex";
        }

        const handleAction = (idx) => (e) => {
            e.preventDefault();
            fire(idx);
        };

        [0, 1, 2].forEach(i => {
            const btn = document.getElementById(`ctrl-${i}`);
            btn.addEventListener('touchstart', handleAction(i), { passive: false });
            btn.addEventListener('mousedown', (e) => {
                if (e.button === 0 && !('ontouchstart' in window)) fire(i);
            });
        });

        document.getElementById('start-btn').onclick = startGame;

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a') fire(0);
            if (e.key.toLowerCase() === 's') fire(1);
            if (e.key.toLowerCase() === 'd') fire(2);
        });
    </script>
</body>
</html>
